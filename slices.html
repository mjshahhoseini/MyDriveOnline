<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2D Slice Viewer (Fallback)</title>
  <style>
    :root { --bg:#0b0d10; --panel:#121417; --fg:#e8eaed; --muted:#9aa0a6; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--fg); font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    .bar { background:var(--panel); padding:10px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
    label { font-size:14px; color:var(--muted); }
    select, input[type="range"] { accent-color:#8ab4f8; }
    .flex { display:flex; align-items:center; gap:8px; }
    .grow { flex:1 }
    .viewer { height: calc(100vh - 60px); display:grid; place-items:center; padding:8px; }
    canvas { image-rendering: pixelated; border:1px solid #2a2f39; background:black; max-width:100%; max-height:100%; }
    .err { color:#f28b82 }
    .ok  { color:#c1fba4 }
    .note { color:var(--muted); font-size:12px }
    .row { display:flex; gap:16px; align-items:center; }
    .right { margin-left:auto }
    .btn { background:#1b222c; border:1px solid #2a2f39; color:var(--fg); padding:6px 10px; border-radius:8px; cursor:pointer; }
    .btn:hover { background:#222a36 }
  </style>
</head>
<body>
  <div class="bar">
    <div class="row">
      <div class="flex">
        <label for="axis">Axis</label>
        <select id="axis">
          <option value="z" selected>Z (XY slice)</option>
          <option value="y">Y (XZ slice)</option>
          <option value="x">X (YZ slice)</option>
        </select>
      </div>
      <div class="flex grow">
        <label for="slice">Slice</label>
        <input id="slice" type="range" min="0" max="0" value="0" class="grow">
        <span id="sliceVal">0</span>
      </div>
      <div class="flex">
        <button id="link3d" class="btn">Open 3D Viewer</button>
      </div>
    </div>
    <div id="status" class="note">Loading volume from <code>plotPerc3.html</code>…</div>
  </div>
  <div class="viewer">
    <canvas id="c" width="512" height="512"></canvas>
  </div>

  <!-- fflate for decompression -->
  <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
  <script>
  // Utility: robustly extract the embedded compressed JSON from plotPerc3.html
  async function loadSnapshotHTML() {
    const res = await fetch('plotPerc3.html', {cache:'no-store'});
    if (!res.ok) throw new Error('Failed to fetch plotPerc3.html');
    return await res.text();
  }

  function extractCompressedString(html) {
    // Look for: window.k3dCompressed = '...';
    const m = html.match(/window\.k3dCompressed\s*=\s*'([^']+)'/);
    if (!m) throw new Error('k3dCompressed blob not found in plotPerc3.html');
    return m[1];
  }

  function decompressToJSON(k3dCompressed) {
    // The blob is a zlib/deflate of a JSON snapshot
    const u8 = fflate.strToU8(k3dCompressed);
    const out = fflate.decompressSync(u8);
    const json = new TextDecoder().decode(out);
    return JSON.parse(json);
  }

  // Attempt to find a volume-like object in the K3D snapshot
  function findVolumeLike(snapshot) {
    // K3D snapshot usually has {objects:[{type: 'Volume', ...}]}
    if (snapshot && Array.isArray(snapshot.objects)) {
      for (const obj of snapshot.objects) {
        const t = (obj.type || obj.object_type || '').toLowerCase();
        if (t.includes('volume')) return obj;
      }
    }
    // Fallback: breadth-search for any object with 'voxels' or 'volume' keys
    let found = null;
    function walk(x) {
      if (!x || typeof x !== 'object') return;
      if (found) return;
      if ('voxels' in x || 'volume' in x || 'data' in x && ('shape' in x || 'grid' in x)) {
        found = x;
        return;
      }
      for (const k of Object.keys(x)) walk(x[k]);
    }
    walk(snapshot);
    return found;
  }

  // Decode array data from various K3D encodings
  function decodeArrayMaybe(obj) {
    // Common K3D pattern: data is base64 in 'data' with 'dtype' and 'shape'
    if (obj && obj.data && obj.shape) {
      const b64 = obj.data;
      const raw = atob(b64);
      const buf = new Uint8Array(raw.length);
      for (let i=0;i<raw.length;i++) buf[i] = raw.charCodeAt(i);
      // Minimal dtype support
      let arr;
      if (obj.dtype && obj.dtype.includes('float32')) arr = new Float32Array(buf.buffer);
      else arr = new Uint8Array(buf.buffer); // fallback
      return {array: arr, shape: obj.shape};
    }
    // Some snapshots inline raw 'voxels' flat array and 'space_size'/'voxels' dims
    if (obj && obj.voxels && (obj.voxels_shape || obj.shape)) {
      const shape = obj.voxels_shape || obj.shape;
      const vox = obj.voxels;
      return {array: Array.isArray(vox) ? Float32Array.from(vox) : vox, shape};
    }
    return null;
  }

  function reshapeFlat(flat, shape) {
    // Return a getter function to read a value by [x,y,z]
    const [nx, ny, nz] = shape;
    return (x,y,z) => {
      const idx = x*ny*nz + y*nz + z;
      return flat[idx] || 0;
    };
  }

  function normalizeSlice(slice2d) {
    // Linearly scale to [0,255]
    let min=Infinity, max=-Infinity;
    for (let v of slice2d) { if (v<min) min=v; if (v>max) max=v; }
    const rng = (max-min) || 1;
    return slice2d.map(v => Math.round(255*(v-min)/rng));
  }

  function drawSliceToCanvas(canvas, vals, w, h) {
    const ctx = canvas.getContext('2d');
    // Resize canvas to fit data
    canvas.width = w;
    canvas.height = h;
    const img = ctx.createImageData(w,h);
    for (let i=0;i<w*h;i++){
      const v = vals[i];
      const j = 4*i;
      img.data[j] = v;
      img.data[j+1] = v;
      img.data[j+2] = v;
      img.data[j+3] = 255;
    }
    ctx.putImageData(img,0,0);
  }

  async function main(){
    const status = document.getElementById('status');
    const axisEl = document.getElementById('axis');
    const slider = document.getElementById('slice');
    const sliceVal = document.getElementById('sliceVal');
    const canvas = document.getElementById('c');
    const link3d = document.getElementById('link3d');
    link3d.onclick = () => location.href = 'index.html';

    try {
      const html = await loadSnapshotHTML();
      const comp = extractCompressedString(html);
      const snapshot = decompressToJSON(comp);

      const vol = findVolumeLike(snapshot);
      if (!vol) throw new Error('Could not find a volume object inside snapshot.');

      // Try common nests: data may be in vol['data'] or vol['voxels'] or vol['volume']['data']
      let decoded = decodeArrayMaybe(vol) 
                 || (vol.volume && decodeArrayMaybe(vol.volume))
                 || (vol.voxels && {array: Float32Array.from(vol.voxels), shape: vol.shape || vol.voxels_shape});

      if (!decoded) {
        // Some K3D exports store 'binary' fields that are zlib-compressed; try to locate them
        // Heuristic: find any object with {data: '<base64>', shape:[x,y,z]}
        let found = null;
        function findDataShape(x){
          if (found) return;
          if (!x || typeof x !== 'object') return;
          if (x.data && x.shape && Array.isArray(x.shape) && x.shape.length===3) { found = x; return; }
          for (const k of Object.keys(x)) findDataShape(x[k]);
        }
        findDataShape(snapshot);
        if (found) decoded = decodeArrayMaybe(found);
      }

      if (!decoded) throw new Error('Found snapshot, but could not decode voxel array.');

      // Shape could be [nx, ny, nz] or similar; ensure integers
      let shape = decoded.shape.map(v => parseInt(v,10));
      if (shape.length !== 3) throw new Error('Volume shape is not 3D.');
      let [nx, ny, nz] = shape;

      // Handle typed array conversion to Float32
      let flat = decoded.array;
      if (!(flat instanceof Float32Array)) {
        // Convert to Float32 for math
        flat = Float32Array.from(flat);
      }
      if (flat.length !== nx*ny*nz) {
        // Some snapshots store ZYX; try to guess transposition if sizes mismatch
        const prod = nx*ny*nz;
        if (flat.length !== prod) throw new Error(`Flat array length (${flat.length}) != nx*ny*nz (${prod}).`);
      }

      const get = reshapeFlat(flat, [nx,ny,nz]);
      status.innerHTML = `<span class="ok">✓ Volume loaded.</span> Shape: ${nx}×${ny}×${nz}`;

      // Configure slider to the largest axis by default (z)
      function updateSliceMax(){
        const ax = axisEl.value;
        const max = (ax==='z') ? (nz-1) : (ax==='y' ? (ny-1) : (nx-1));
        slider.max = String(max);
        if (parseInt(slider.value,10) > max) slider.value = String(Math.floor(max/2));
        sliceVal.textContent = slider.value;
      }

      function render(){
        const ax = axisEl.value;
        const idx = parseInt(slider.value,10);
        sliceVal.textContent = String(idx);
        let w,h, data=[];

        if (ax==='z'){ w=nx; h=ny;
          for (let y=0;y<ny;y++) for (let x=0;x<nx;x++) data.push(get(x,y,idx));
        } else if (ax==='y'){ w=nx; h=nz;
          for (let z=0;z<nz;z++) for (let x=0;x<nx;x++) data.push(get(x,idx,z));
        } else { w=ny; h=nz;
          for (let z=0;z<nz;z++) for (let y=0;y<ny;y++) data.push(get(idx,y,z));
        }

        const gray = normalizeSlice(data);
        drawSliceToCanvas(canvas, gray, w, h);
      }

      axisEl.addEventListener('change', () => { updateSliceMax(); render(); });
      slider.addEventListener('input', render);

      updateSliceMax();
      render();

    } catch (err) {
      const status = document.getElementById('status');
      status.innerHTML = `<span class="err">Error:</span> ${err.message}<br><span class="note">If this persists, the snapshot export format may differ. In that case I can wire the data explicitly from your Python export.</span>`;
      console.error(err);
    }
  }

  main();
  </script>
</body>
</html>
